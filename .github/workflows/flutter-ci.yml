name: Flutter CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: Install dependencies
        run: cd speed_test_app && flutter pub get

      - name: Analyze code
        run: cd speed_test_app && flutter analyze --no-fatal-infos

      - name: Build release APK
        run: cd speed_test_app && flutter build apk --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: speed_test_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

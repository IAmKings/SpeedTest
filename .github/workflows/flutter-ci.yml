name: Flutter CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: Install dependencies
        run: cd speed_test_app && flutter pub get

      - name: Analyze code
        run: cd speed_test_app && flutter analyze --no-fatal-infos

      - name: Build release APK
        run: cd speed_test_app && flutter build apk --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        with:
          name: flutter-apk
          path: speed_test_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: speed_test_app/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
